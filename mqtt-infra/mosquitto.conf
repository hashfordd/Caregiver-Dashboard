# Mosquitto config — ENG40011 caregiver dashboard prototype broker.
# TODO: MQ-09 — production swap-in plan to AWS IoT Core (cert handling differs).

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# ============================================================================
# Auth — username/password per device + ACL enforcement
# TODO: MQ-04 — rotate credentials before any non-team testing.
# ============================================================================
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# ============================================================================
# Listener: plain MQTT (1883) — LOCAL DEV ONLY
# Disable in any cloud-hosted deployment; production traffic goes via 8883.
# ============================================================================
listener 1883 127.0.0.1
protocol mqtt

# ============================================================================
# Listener: MQTT over TLS (8883) — production-ish
# Self-signed certs are fine for prototype; ship the CA to firmware.
# ============================================================================
listener 8883 0.0.0.0
protocol mqtt
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate false
tls_version tlsv1.2

# ============================================================================
# Listener: MQTT over WebSockets (9001) — useful for browser observability
# ============================================================================
listener 9001 0.0.0.0
protocol websockets
