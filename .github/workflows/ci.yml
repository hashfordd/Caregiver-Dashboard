name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# After the 0cdbd92 restructure the workspace lives under codebase/.
# `defaults.run.working-directory` makes every `run:` step execute
# from there, so npm + grep + supabase commands resolve correctly.
defaults:
  run:
    working-directory: codebase

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Node caching needs the lockfile path from the repo root.
          cache-dependency-path: codebase/package-lock.json

      - name: Set up Deno (for edge function typecheck)
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Set up Supabase CLI
        # Phase H item 77: gives the runner the `supabase` binary so
        # the local stack can boot for the RLS / edge integration tests.
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: npm ci

      - name: Service-role guard (no SERVICE_ROLE in apps/web/)
        run: |
          # The two excluded test files legitimately reference SERVICE_ROLE:
          # rls.test.ts uses the key to drive admin-API calls against a local
          # Supabase; ci-grep.test.ts mirrors this CI rule as a unit test.
          # multi-user.test.ts references SB_SERVICE_KEY only as an env name.
          if grep -rn "SERVICE_ROLE" apps/web/ \
              --exclude-dir=node_modules \
              --exclude-dir=dist \
              --exclude='rls.test.ts' \
              --exclude='ci-grep.test.ts' \
              --exclude='multi-user.test.ts' \
              --include='*.ts' \
              --include='*.tsx' \
              --include='*.js' \
              --include='*.jsx' \
              --include='*.json' \
              --include='*.html'; then
            echo "::error::SERVICE_ROLE must never appear in apps/web/"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      # Phase H item 77: spin up the local Supabase stack so the RLS
      # tests + edge integration tests run against a real DB. Without
      # this, CROSS_CUTTING §13's "RLS denial test required-or-CI-fails"
      # was theatrical — the suite was env-gated to skip on every CI
      # run because no Supabase URL was reachable. The stack is torn
      # down in the always-run cleanup step below.
      - name: Start Supabase
        run: supabase start

      - name: Export Supabase env into the runner
        run: |
          # `supabase status -o env` emits KEY=VALUE pairs (DB_URL,
          # API_URL, SERVICE_ROLE_KEY, ANON_KEY, ...). Feed the relevant
          # ones into GITHUB_ENV under the names the tests + seed expect.
          eval "$(supabase status -o env)"
          {
            echo "SB_URL=$API_URL"
            echo "SB_ANON_KEY=$ANON_KEY"
            echo "SB_SERVICE_KEY=$SERVICE_ROLE_KEY"
            echo "RUN_RLS_TESTS=1"
          } >> "$GITHUB_ENV"

      - name: Test (all workspaces)
        run: npm run test

      - name: Build web (with stub env vars)
        run: npm run build --workspace @alzcare/web
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: stub-for-build

      - name: Stop Supabase
        if: always()
        run: supabase stop || true
