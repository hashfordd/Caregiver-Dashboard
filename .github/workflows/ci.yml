name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up Deno (for edge function typecheck)
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Service-role guard (no SERVICE_ROLE in apps/web/)
        run: |
          # The two excluded test files legitimately reference SERVICE_ROLE:
          # rls.test.ts uses the key to drive admin-API calls against a local
          # Supabase; ci-grep.test.ts mirrors this CI rule as a unit test.
          if grep -rn "SERVICE_ROLE" apps/web/ \
              --exclude-dir=node_modules \
              --exclude-dir=dist \
              --exclude='rls.test.ts' \
              --exclude='ci-grep.test.ts' \
              --include='*.ts' \
              --include='*.tsx' \
              --include='*.js' \
              --include='*.jsx' \
              --include='*.json' \
              --include='*.html'; then
            echo "::error::SERVICE_ROLE must never appear in apps/web/"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      - name: Test (all workspaces)
        run: npm run test

      - name: Build web (with stub env vars)
        run: npm run build --workspace @alzcare/web
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: stub-for-build
